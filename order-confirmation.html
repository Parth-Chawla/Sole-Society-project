<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Confirmation - Sole Society</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&amp;family=Orbitron:wght@900&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'primary': '#FACC15','background-dark':'#000','text-light':'#F9FAFB' }, fontFamily: { 'display':['Orbitron','sans-serif'], 'body':['Chakra Petch','sans-serif'] } } } };
</script>
<script defer src="assets/js/order-confirmation.js"></script>
<script defer src="assets/js/footer.js"></script>
</head>
<body class="bg-background-dark text-text-light font-body">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-black/40 rounded-lg p-8 border border-primary/30 text-center">
      <h1 class="text-4xl font-display font-black mb-3">Thank You for Your Order!</h1>
      <p class="opacity-80">Your order has been placed successfully.</p>
      <p class="mt-2">Total paid: <span id="oc-total" class="font-semibold">₹ 0.00</span></p>

      <hr class="my-6 border-white/10" />

      <h2 class="text-2xl font-display mb-2">Rate Your Experience</h2>
      <div class="flex justify-center gap-2 mb-4 text-3xl">
        <button class="star" data-rating="1">★</button>
        <button class="star" data-rating="2">★</button>
        <button class="star" data-rating="3">★</button>
        <button class="star" data-rating="4">★</button>
        <button class="star" data-rating="5">★</button>
      </div>
      <p id="rating-message" class="opacity-80 mb-6"></p>

      <a href="index.html" class="inline-block px-5 py-2 rounded bg-primary text-black font-display">Return to Dashboard</a>
    </div>
  </div>
</body></html>
